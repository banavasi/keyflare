name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libgtk-layer-shell-dev libinput-tools
      - name: Build (C / GTK)
        run: make -C linux

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (Swift / AppKit)
        working-directory: macos
        run: swift build -v
